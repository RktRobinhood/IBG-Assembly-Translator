<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Live Subtitles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080810; color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}

/* ── topbar ── */
#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 22px; background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;
}
#logo { font-size:12px; font-weight:700; letter-spacing:.08em; color:rgba(255,255,255,.22); text-transform:uppercase; }
#lang-toggle { display:flex; gap:6px; align-items:center; }
.ltab {
  font-size:11px; font-weight:700; letter-spacing:.07em;
  padding:4px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.3); cursor:pointer; transition:all .2s; background:none;
}
.ltab.active-en { border-color:#60a5fa; color:#93c5fd; background:rgba(96,165,250,.12); }
.ltab.active-da { border-color:#f87171; color:#fca5a5; background:rgba(248,113,113,.12); }
#ltab-auto.active-auto { border-color:#a78bfa; color:#c4b5fd; background:rgba(167,139,250,.12); }
#dot-wrap { display:flex; align-items:center; gap:7px; }
#mic-dot { width:9px; height:9px; border-radius:50%; background:#374151; transition:background .3s; }
#mic-dot.on   { background:#10b981; animation:pulse 2s infinite; }
#mic-dot.busy { background:#f59e0b; }
#mic-dot.off  { background:#6b7280; }
@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,.5); }
  50%     { box-shadow:0 0 0 8px rgba(16,185,129,0); }
}
#mic-label { font-size:11px; color:rgba(255,255,255,.28); }

/* ── two column stage ── */
#stage {
  flex:1; display:grid; grid-template-columns:1fr 1px 1fr;
  overflow:hidden; min-height:0;
}
.divider { background:rgba(255,255,255,.07); }

.col {
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}

/* fade top */
.col::after {
  content:''; position:absolute; top:0; left:0; right:0; height:120px;
  background:linear-gradient(to bottom,#080810 0%,rgba(8,8,16,0) 100%);
  pointer-events:none; z-index:5;
}

.col-header {
  padding:12px 24px 8px; font-size:11px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; flex-shrink:0; z-index:6;
  position:relative;
}
#col-en .col-header { color:#60a5fa; border-bottom:1px solid rgba(96,165,250,.12); }
#col-da .col-header { color:#f87171; border-bottom:1px solid rgba(248,113,113,.12); }

/* The scroll container — newest at BOTTOM */
.scroll-area {
  flex:1; overflow:hidden; position:relative;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:0 28px 28px;
  gap:0;
}

/* Each sentence block */
.line-block {
  width:100%;
  text-align:center;
  flex-shrink:0;
  /* animate in from below */
  animation:slideUp .35s ease-out forwards;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Age classes applied to older blocks */
.line-block.age0 {
  /* newest — biggest, brightest */
  font-size:clamp(28px,3.8vw,58px);
  font-weight:700;
  color:#ffffff;
  line-height:1.25;
  padding:6px 0;
}
.line-block.age1 {
  font-size:clamp(18px,2.4vw,34px);
  font-weight:500;
  color:rgba(255,255,255,.45);
  line-height:1.3;
  padding:4px 0;
}
.line-block.age2 {
  font-size:clamp(13px,1.7vw,22px);
  font-weight:400;
  color:rgba(255,255,255,.18);
  line-height:1.4;
  padding:3px 0;
}
.line-block.age3 {
  font-size:clamp(10px,1.2vw,16px);
  font-weight:400;
  color:rgba(255,255,255,.07);
  line-height:1.4;
  padding:2px 0;
}

/* transition older blocks smoothly */
.line-block {
  transition: font-size .4s ease, color .4s ease, padding .4s ease;
}

/* interim live typing — shown below the latest block */
.interim-line {
  text-align:center; font-style:italic;
  font-size:clamp(14px,1.8vw,24px);
  color:rgba(255,255,255,.25);
  padding:4px 0 0;
  min-height:1.6em;
  flex-shrink:0;
}
#interim-en { color:rgba(147,197,253,.4); }
#interim-da { color:rgba(252,165,165,.4); }

/* shimmer while translating */
@keyframes shimmer { 0%,100%{opacity:.2} 50%{opacity:.5} }
.shimmer-text {
  animation:shimmer 1s infinite;
  color:rgba(255,255,255,.3)!important;
  font-style:italic;
}

/* ── controls ── */
#controls {
  padding:12px 22px; display:flex; align-items:center;
  justify-content:center; gap:10px; background:rgba(255,255,255,.02);
  border-top:1px solid rgba(255,255,255,.06); flex-shrink:0;
}
button {
  border:none; border-radius:8px; cursor:pointer;
  font-size:13px; font-weight:600; padding:9px 20px; transition:all .15s;
}
button:active { transform:scale(.96); }
#btn-start { background:#10b981; color:#fff; min-width:110px; }
#btn-start:hover:not(:disabled) { background:#059669; }
#btn-start:disabled { background:#1e293b; color:#4b5563; cursor:not-allowed; }
#btn-stop  { background:#ef4444; color:#fff; }
#btn-stop:hover:not(:disabled)  { background:#dc2626; }
#btn-stop:disabled { background:#1e293b; color:#4b5563; cursor:not-allowed; }
#btn-clear { background:rgba(255,255,255,.07); color:rgba(255,255,255,.45); }
#btn-clear:hover { background:rgba(255,255,255,.11); }
#info { font-size:11px; color:rgba(255,255,255,.2); min-width:150px; text-align:center; }

#debug {
  position:fixed; bottom:54px; left:0; right:0; text-align:center;
  font-size:10px; color:rgba(255,255,255,.2); pointer-events:none;
  padding:2px 8px; font-family:monospace; z-index:10;
}
#fs-btn {
  position:fixed; bottom:56px; right:14px; font-size:11px;
  color:rgba(255,255,255,.13); cursor:pointer; background:none; border:none; padding:3px;
}

/* ── permission overlay ── */
#perm-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(8,8,16,.97); flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  text-align:center; padding:40px;
}
#perm-overlay.show { display:flex; }
#perm-overlay h2 { font-size:26px; font-weight:700; }
#perm-overlay p  { font-size:15px; color:rgba(255,255,255,.5); max-width:440px; line-height:1.6; }
#btn-grant {
  background:#10b981; color:#fff; font-size:17px; font-weight:700;
  padding:14px 36px; border-radius:12px; border:none; cursor:pointer;
}
#btn-grant:hover { background:#059669; }
#btn-grant:disabled { background:#374151; cursor:not-allowed; }
#perm-err { color:#fca5a5; font-size:13px; display:none; max-width:440px; line-height:1.5; }
</style>
</head>
<body>

<div id="perm-overlay">
  <div style="font-size:52px">🎤</div>
  <h2>Microphone Access Needed</h2>
  <p>Click the button below, then click <strong>Allow</strong> when Chrome asks.<br>This only happens once — the site remembers your choice.</p>
  <button id="btn-grant">Allow Microphone &amp; Start</button>
  <div id="perm-err"></div>
</div>

<div id="topbar">
  <div id="logo">🏫 Assembly Live Subtitles</div>
  <div id="lang-toggle">
    <button class="ltab" id="ltab-auto" onclick="setMode('auto')">AUTO</button>
    <button class="ltab" id="ltab-en"   onclick="setMode('en')">EN→DA</button>
    <button class="ltab" id="ltab-da"   onclick="setMode('da')">DA→EN</button>
  </div>
  <div id="dot-wrap">
    <div id="mic-dot"></div>
    <span id="mic-label">Idle</span>
  </div>
</div>

<div id="stage">
  <div class="col" id="col-en">
    <div class="col-header">🇬🇧 English</div>
    <div class="scroll-area" id="scroll-en">
      <div class="interim-line" id="interim-en"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col" id="col-da">
    <div class="col-header">🇩🇰 Dansk</div>
    <div class="scroll-area" id="scroll-da">
      <div class="interim-line" id="interim-da"></div>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btn-start">▶ Start</button>
  <button id="btn-stop" disabled>⏹ Stop</button>
  <button id="btn-clear">✕ Clear</button>
  <div id="info">Spacebar to toggle</div>
</div>

<div id="debug"></div>
<button id="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>

<script>
// ── All state declared first ───────────────────────────────
const MAX_LINES  = 6;   // max sentence blocks per column
let mode         = 'auto';
let isRunning    = false;
let recEN        = null;
let recDA        = null;
let micStream    = null;
let xlating      = false;
// Dedup: track last claimed phrase to prevent both recognizers handling same speech
let claimedText  = '';
let claimedAt    = 0;
const xQueue     = [];
// Per-column line tracking
const linesEN    = [];  // array of DOM elements, index 0 = newest
const linesDA    = [];

// ── DOM ───────────────────────────────────────────────────
const $         = id => document.getElementById(id);
const scrollEN  = $('scroll-en'),  scrollDA  = $('scroll-da');
const intEN     = $('interim-en'), intDA     = $('interim-da');
const micDot    = $('mic-dot'),    micLbl    = $('mic-label');
const infoEl    = $('info'),       dbgEl     = $('debug');
const btnStart  = $('btn-start'),  btnStop   = $('btn-stop');
const permOvr   = $('perm-overlay'), permErr = $('perm-err');
const btnGrant  = $('btn-grant');

// ── Utils ─────────────────────────────────────────────────
function log(m) { console.log('[subs]', m); dbgEl.textContent = m; }
function setMic(cls, lbl) {
  micDot.className   = cls;
  micLbl.textContent = lbl;
  infoEl.textContent = lbl;
}

// ── Star Wars scroll ──────────────────────────────────────
// Newest line is always at the bottom (age0 = biggest/brightest).
// Each time a new line is added, existing lines get aged up.
function addLine(col, text, isShimmer) {
  const lines  = col === 'en' ? linesEN : linesDA;
  const scroll = col === 'en' ? scrollEN : scrollDA;
  const intEl  = col === 'en' ? intEN   : intDA;

  // Age all existing lines up by one
  lines.forEach((el, i) => {
    el.classList.remove('age0','age1','age2','age3');
    el.classList.add('age' + Math.min(i + 1, 3));
  });

  // Create new line block (age0 = newest = biggest)
  const div = document.createElement('div');
  div.className = 'line-block age0';
  if (isShimmer) div.classList.add('shimmer-text');
  div.textContent = text;

  // Insert before the interim element (which stays at bottom)
  scroll.insertBefore(div, intEl);
  lines.unshift(div); // newest first in array

  // Remove lines beyond MAX
  while (lines.length > MAX_LINES) {
    const old = lines.pop();
    old.remove();
  }
}

function updateNewest(col, text, isShimmer) {
  const lines = col === 'en' ? linesEN : linesDA;
  if (!lines.length) { addLine(col, text, isShimmer); return; }
  const el = lines[0];
  el.textContent = text;
  if (isShimmer) el.classList.add('shimmer-text');
  else           el.classList.remove('shimmer-text');
}

// ── Translation queue ─────────────────────────────────────
async function translate(text, from, to) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const go  = () => fetch(url).then(r => r.json()).then(d => {
    if (d.responseStatus === 200) return d.responseData.translatedText;
    throw new Error(d.responseDetails);
  });
  const [a, b] = await Promise.allSettled([go(), go()]);
  if (a.status === 'fulfilled') return a.value;
  if (b.status === 'fulfilled') return b.value;
  throw new Error('Translation failed');
}

function enqueue(spokenText, spokenLang) {
  // Hard dedup — if this exact text was claimed within 2s, skip
  const now = Date.now();
  if (spokenText === claimedText && now - claimedAt < 2000) {
    log('dedup skip [' + spokenLang + ']: ' + spokenText.slice(0, 30));
    return;
  }
  claimedText = spokenText;
  claimedAt   = now;

  xQueue.push({ spokenText, spokenLang });
  if (!xlating) drainQueue();
}

async function drainQueue() {
  if (!xQueue.length) { xlating = false; if (isRunning) setMic('on', 'Listening…'); return; }
  xlating = true;
  const { spokenText, spokenLang } = xQueue.shift();
  const isEN    = spokenLang === 'en';
  const srcCol  = isEN ? 'en' : 'da';
  const dstCol  = isEN ? 'da' : 'en';

  // Add spoken text to its column
  addLine(srcCol, spokenText, false);

  // Add shimmer placeholder in translation column
  addLine(dstCol, 'translating…', true);

  setMic('busy', 'Translating…');

  try {
    const result = await translate(spokenText, isEN ? 'en' : 'da', isEN ? 'da' : 'en');
    updateNewest(dstCol, result, false);
  } catch(e) {
    updateNewest(dstCol, '—', false);
    log('Translation error: ' + e.message);
  }

  drainQueue();
}

// ── Mode toggle ───────────────────────────────────────────
function setMode(m) {
  mode = m;
  $('ltab-auto').className = 'ltab' + (m === 'auto' ? ' active-auto' : '');
  $('ltab-en').className   = 'ltab' + (m === 'en'   ? ' active-en'   : '');
  $('ltab-da').className   = 'ltab' + (m === 'da'   ? ' active-da'   : '');
  if (!isRunning) return;
  // Swap active recognizers to match new mode
  if (m === 'en') {
    killRec(recDA); recDA = null;
    if (!recEN) recEN = makeRec('en');
  } else if (m === 'da') {
    killRec(recEN); recEN = null;
    if (!recDA) recDA = makeRec('da');
  } else {
    if (!recEN) recEN = makeRec('en');
    if (!recDA) setTimeout(() => { if (isRunning && !recDA) recDA = makeRec('da'); }, 1500);
  }
}

// ── Recognizer factory ────────────────────────────────────
function makeRec(lang) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;

  const r = new SR();
  r.lang            = lang === 'en' ? 'en-US' : 'da-DK';
  r.continuous      = true;
  r.interimResults  = true;
  r.maxAlternatives = 1;

  r.onstart = () => { log(lang.toUpperCase() + ' rec started'); setMic('on', 'Listening…'); };

  r.onresult = (e) => {
    let interim = '', finals = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finals  += t + ' ';
      else                      interim += t;
    }

    // Update interim in this language's column
    if (lang === 'en') intEN.textContent = interim;
    else               intDA.textContent = interim;

    if (finals.trim()) {
      if (lang === 'en') intEN.textContent = '';
      else               intDA.textContent = '';
      log(lang.toUpperCase() + ': ' + finals.trim().slice(0, 50));
      enqueue(finals.trim(), lang);
    }
  };

  r.onerror = (e) => {
    log(lang + ' error: ' + e.error);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      permErr.textContent  = 'Mic blocked. Click 🔒 → Site settings → Microphone → Allow → refresh.';
      permErr.style.display = 'block';
      permOvr.classList.add('show');
      stopAll();
    }
  };

  r.onend = () => {
    // Only restart if this recognizer is still the active one
    const stillActive = (lang === 'en' && recEN === r) || (lang === 'da' && recDA === r);
    if (isRunning && stillActive) {
      setTimeout(() => { try { r.start(); log(lang + ' restarted'); } catch(ex) { log(lang + ' restart failed: ' + ex.message); } }, 300);
    }
  };

  try { r.start(); }
  catch(e) { log('makeRec start (' + lang + ') error: ' + e.message); }

  return r;
}

function killRec(r) {
  if (!r) return;
  r.onstart = r.onresult = r.onerror = r.onend = null;
  try { r.abort(); } catch(e) {}
}

// ── Start / stop ──────────────────────────────────────────
function doStart() {
  isRunning = true;
  btnStart.disabled = true;
  btnStop.disabled  = false;
  log('Starting, mode=' + mode);

  if (mode === 'en' || mode === 'auto') recEN = makeRec('en');
  if (mode === 'da' || mode === 'auto') {
    // Stagger DA start 1.5s so Chrome doesn't see two simultaneous mic grabs
    setTimeout(() => { if (isRunning && (mode === 'da' || mode === 'auto')) recDA = makeRec('da'); }, 1500);
  }
}

function stopAll() {
  isRunning = false;
  killRec(recEN); recEN = null;
  killRec(recDA); recDA = null;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  xQueue.length = 0; xlating = false;
  btnStart.disabled = false; btnStop.disabled = true;
  intEN.textContent = ''; intDA.textContent = '';
  setMic('off', 'Stopped');
}

// ── Permission flow ───────────────────────────────────────
btnGrant.addEventListener('click', async () => {
  btnGrant.textContent  = 'Requesting…';
  btnGrant.disabled     = true;
  permErr.style.display = 'none';
  log('getUserMedia called from click…');
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    log('Mic granted ✓ tracks=' + micStream.getAudioTracks().length);
    permOvr.classList.remove('show');
    doStart();
  } catch(e) {
    log('getUserMedia denied: ' + e.name + ' ' + e.message);
    btnGrant.textContent  = 'Try Again';
    btnGrant.disabled     = false;
    permErr.textContent   = 'Could not access microphone: ' + e.message;
    permErr.style.display = 'block';
  }
});

function startAll() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    permErr.textContent   = 'Must be served over HTTPS. Use your GitHub Pages URL.';
    permErr.style.display = 'block';
    permOvr.classList.add('show');
    return;
  }
  if (navigator.permissions) {
    navigator.permissions.query({ name:'microphone' }).then(r => {
      log('Mic permission: ' + r.state);
      if (r.state === 'granted') {
        navigator.mediaDevices.getUserMedia({ audio:true }).then(s => { micStream = s; doStart(); })
          .catch(e => { log('gUM failed: ' + e.message); permOvr.classList.add('show'); });
      } else if (r.state === 'denied') {
        permErr.textContent   = 'Mic blocked. Click 🔒 → Site settings → Microphone → Allow → refresh.';
        permErr.style.display = 'block';
        permOvr.classList.add('show');
      } else {
        permOvr.classList.add('show');
      }
    }).catch(() => permOvr.classList.add('show'));
  } else {
    permOvr.classList.add('show');
  }
}

// ── Button / keyboard handlers ────────────────────────────
btnStart.addEventListener('click', startAll);
btnStop.addEventListener ('click', stopAll);
$('btn-clear').addEventListener('click', () => {
  // Remove all line blocks, keep interim elements
  linesEN.forEach(el => el.remove()); linesEN.length = 0;
  linesDA.forEach(el => el.remove()); linesDA.length = 0;
  intEN.textContent = ''; intDA.textContent = '';
  claimedText = '';
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' && e.target === document.body) { e.preventDefault(); isRunning ? stopAll() : startAll(); }
  if (e.key === 'Escape') stopAll();
  if (e.key === 'F11') { e.preventDefault(); toggleFS(); }
});

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ── Init ──────────────────────────────────────────────────
setMode('auto');

window.onload = () => {
  const hasSR   = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  const isHTTPS = location.protocol === 'https:' || location.hostname === 'localhost';
  log('SR=' + hasSR + ' HTTPS=' + isHTTPS);
  if (!hasSR) { btnStart.disabled = true; setMic('off','Requires Chrome or Edge'); }
  if (!isHTTPS) {
    permErr.textContent   = 'Must be served over HTTPS. Use your GitHub Pages URL (https://...).';
    permErr.style.display = 'block';
    permOvr.classList.add('show');
  }
};
</script>
</body>
</html>
