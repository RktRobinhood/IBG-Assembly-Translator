<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Live Subtitles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080810; color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}

/* ── topbar ── */
#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 22px; background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;
}
#logo { font-size:12px; font-weight:700; letter-spacing:.08em; color:rgba(255,255,255,.22); text-transform:uppercase; }

#lang-toggle { display:flex; gap:6px; align-items:center; }
.ltab {
  font-size:11px; font-weight:700; letter-spacing:.07em;
  padding:4px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.3); cursor:pointer; transition:all .2s; background:none;
}
.ltab.active-en { border-color:#60a5fa; color:#93c5fd; background:rgba(96,165,250,.12); }
.ltab.active-da { border-color:#f87171; color:#fca5a5; background:rgba(248,113,113,.12); }
#ltab-auto.active-auto { border-color:#a78bfa; color:#c4b5fd; background:rgba(167,139,250,.12); }

#dot-wrap { display:flex; align-items:center; gap:7px; }
#mic-dot {
  width:9px; height:9px; border-radius:50%;
  background:#374151; transition:background .3s;
}
#mic-dot.on   { background:#10b981; animation:pulse 2s infinite; }
#mic-dot.busy { background:#f59e0b; }
#mic-dot.off  { background:#6b7280; }
@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,.5); }
  50%     { box-shadow:0 0 0 8px rgba(16,185,129,0); }
}
#mic-label { font-size:11px; color:rgba(255,255,255,.28); }

/* ── columns ── */
#stage {
  flex:1; display:grid; grid-template-columns:1fr 1px 1fr;
  overflow:hidden; min-height:0;
}
.divider { background:rgba(255,255,255,.07); }
.col { display:flex; flex-direction:column; overflow:hidden; position:relative; }
.col::before {
  content:''; position:absolute; top:0; left:0; right:0; height:80px;
  background:linear-gradient(to bottom,#080810,transparent);
  pointer-events:none; z-index:5;
}
.col-header {
  padding:13px 26px 9px; font-size:11px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; flex-shrink:0; z-index:2;
}
#col-en .col-header { color:#60a5fa; border-bottom:1px solid rgba(96,165,250,.12); }
#col-da .col-header { color:#f87171; border-bottom:1px solid rgba(248,113,113,.12); }
.subtitle-area {
  flex:1; display:flex; flex-direction:column;
  justify-content:flex-end; padding:12px 28px 22px;
  overflow:hidden; min-height:0; gap:5px;
}
.sent-line { font-size:clamp(12px,1.4vw,18px); line-height:1.5; text-align:center; word-break:break-word; }
.sent-line.age1 { color:rgba(255,255,255,.2); }
.sent-line.age2 { color:rgba(255,255,255,.08); }
.sent-line.age3 { color:rgba(255,255,255,.03); }
.live-text {
  font-size:clamp(24px,3.4vw,52px); font-weight:700; line-height:1.25;
  text-align:center; margin-top:8px; min-height:1.3em; word-break:break-word;
}
.interim-text {
  font-size:clamp(13px,1.6vw,22px); text-align:center; margin-top:5px;
  min-height:1.4em; font-style:italic; word-break:break-word; opacity:.4;
}
#interim-en { color:#93c5fd; }
#interim-da { color:#fca5a5; }
@keyframes shimmer { 0%,100%{opacity:.2} 50%{opacity:.55} }
.shimmer {
  animation:shimmer 1s infinite; color:rgba(255,255,255,.35)!important;
  font-style:italic; font-weight:400!important; font-size:clamp(13px,1.7vw,22px)!important;
}

/* ── controls ── */
#controls {
  padding:13px 22px; display:flex; align-items:center;
  justify-content:center; gap:10px; background:rgba(255,255,255,.02);
  border-top:1px solid rgba(255,255,255,.06); flex-shrink:0;
}
button {
  border:none; border-radius:8px; cursor:pointer;
  font-size:13px; font-weight:600; padding:9px 20px; transition:all .15s;
}
button:active { transform:scale(.96); }
#btn-start { background:#10b981; color:#fff; min-width:110px; }
#btn-start:hover:not(:disabled) { background:#059669; }
#btn-start:disabled { background:#1e293b; color:#4b5563; cursor:not-allowed; }
#btn-stop  { background:#ef4444; color:#fff; }
#btn-stop:hover:not(:disabled) { background:#dc2626; }
#btn-stop:disabled { background:#1e293b; color:#4b5563; cursor:not-allowed; }
#btn-clear { background:rgba(255,255,255,.07); color:rgba(255,255,255,.45); }
#btn-clear:hover { background:rgba(255,255,255,.11); }
#info { font-size:11px; color:rgba(255,255,255,.2); min-width:160px; text-align:center; }

#debug {
  position:fixed; bottom:54px; left:0; right:0; text-align:center;
  font-size:10px; color:rgba(255,255,255,.2); pointer-events:none;
  padding:2px 8px; font-family:monospace;
}
#fs-btn {
  position:fixed; bottom:56px; right:14px; font-size:11px;
  color:rgba(255,255,255,.13); cursor:pointer; background:none; border:none; padding:3px;
}

/* ── permission overlay ── */
#perm-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(8,8,16,.97); flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  text-align:center; padding:40px;
}
#perm-overlay.show { display:flex; }
#perm-overlay h2 { font-size:26px; font-weight:700; }
#perm-overlay p  { font-size:15px; color:rgba(255,255,255,.5); max-width:440px; line-height:1.6; }
#btn-grant {
  background:#10b981; color:#fff; font-size:17px; font-weight:700;
  padding:14px 36px; border-radius:12px; border:none; cursor:pointer;
}
#btn-grant:hover { background:#059669; }
#btn-grant:disabled { background:#374151; cursor:not-allowed; }
#perm-err { color:#fca5a5; font-size:13px; display:none; max-width:440px; line-height:1.5; }
</style>
</head>
<body>

<div id="perm-overlay">
  <div style="font-size:52px">🎤</div>
  <h2>Microphone Access Needed</h2>
  <p>Click the button below, then click <strong>Allow</strong> when Chrome asks.<br>This only happens once — the site remembers your choice.</p>
  <button id="btn-grant">Allow Microphone &amp; Start</button>
  <div id="perm-err"></div>
</div>

<div id="topbar">
  <div id="logo">🏫 Assembly Live Subtitles</div>
  <div id="lang-toggle">
    <button class="ltab" id="ltab-auto" onclick="setMode('auto')">AUTO</button>
    <button class="ltab" id="ltab-en"   onclick="setMode('en')">EN→DA</button>
    <button class="ltab" id="ltab-da"   onclick="setMode('da')">DA→EN</button>
  </div>
  <div id="dot-wrap">
    <div id="mic-dot"></div>
    <span id="mic-label">Idle</span>
  </div>
</div>

<div id="stage">
  <div class="col" id="col-en">
    <div class="col-header">🇬🇧 English</div>
    <div class="subtitle-area">
      <div id="hist-en"></div>
      <div class="live-text"    id="live-en"></div>
      <div class="interim-text" id="interim-en"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col" id="col-da">
    <div class="col-header">🇩🇰 Dansk</div>
    <div class="subtitle-area">
      <div id="hist-da"></div>
      <div class="live-text"    id="live-da"></div>
      <div class="interim-text" id="interim-da"></div>
    </div>
  </div>
</div>

<div id="controls">
  <button id="btn-start">▶ Start</button>
  <button id="btn-stop" disabled>⏹ Stop</button>
  <button id="btn-clear">✕ Clear</button>
  <div id="info">Spacebar to toggle</div>
</div>

<div id="debug"></div>
<button id="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>

<script>
// ═══════════════════════════════════════════════════════════
//  TWO continuous recognizers, started 1.5s apart.
//  Chrome only prompts for mic once because we call getUserMedia
//  first (inside a real click handler) and keep that stream alive.
//  Both recognizers share that already-open mic — no re-prompts.
//
//  AUTO mode: both run simultaneously. Whichever fires a final
//  result wins that phrase. The other's interim is shown greyed.
//  EN→DA mode: only the en-US recognizer is active.
//  DA→EN mode: only the da-DK recognizer is active.
//
//  Language detection: NOT needed — the recognizer that produced
//  the text IS the language. en-US result → English. da-DK → Danish.
// ═══════════════════════════════════════════════════════════

// ── State (all declared first — no hoisting bugs) ─────────
const MAX_HIST   = 4;
let mode         = 'auto';
let isRunning    = false;
let recEN        = null;
let recDA        = null;
let micStream    = null;
let lastWinText  = '';
let lastWinTime  = 0;
let xlating      = false;
let histArrEN    = [];
let histArrDA    = [];
const xQueue     = [];

// ── DOM ───────────────────────────────────────────────────
const $         = id => document.getElementById(id);
const liveEN    = $('live-en'),    liveDA    = $('live-da');
const intEN     = $('interim-en'), intDA     = $('interim-da');
const histBoxEN = $('hist-en'),    histBoxDA = $('hist-da');
const micDot    = $('mic-dot'),    micLbl    = $('mic-label');
const infoEl    = $('info'),       dbgEl     = $('debug');
const btnStart  = $('btn-start'),  btnStop   = $('btn-stop');
const permOvr   = $('perm-overlay'),permErr  = $('perm-err');
const btnGrant  = $('btn-grant');

// ── Utils ─────────────────────────────────────────────────
function log(m) { console.log('[subs]', m); dbgEl.textContent = m; }
function setMic(cls, lbl) { micDot.className = cls; micLbl.textContent = lbl; infoEl.textContent = lbl; }

function pushHist(lang, text) {
  const arr = lang === 'en' ? histArrEN : histArrDA;
  const box = lang === 'en' ? histBoxEN : histBoxDA;
  arr.push(text);
  while (arr.length > MAX_HIST) arr.shift();
  box.innerHTML = arr.map((t, i) =>
    `<div class="sent-line age${arr.length - i}">${t}</div>`
  ).join('');
}

// ── Mode toggle ───────────────────────────────────────────
function setMode(m) {
  mode = m;
  $('ltab-auto').className = 'ltab' + (m === 'auto' ? ' active-auto' : '');
  $('ltab-en').className   = 'ltab' + (m === 'en'   ? ' active-en'   : '');
  $('ltab-da').className   = 'ltab' + (m === 'da'   ? ' active-da'   : '');

  // If already running, enable/disable recognizers for the new mode
  if (!isRunning) return;
  if (m === 'en') {
    // Kill DA recognizer, make sure EN is running
    killRec(recDA); recDA = null;
    if (!recEN) recEN = makeRec('en');
  } else if (m === 'da') {
    // Kill EN recognizer, make sure DA is running
    killRec(recEN); recEN = null;
    if (!recDA) recDA = makeRec('da');
  } else {
    // AUTO — both should be running
    if (!recEN) recEN = makeRec('en');
    if (!recDA) { setTimeout(() => { if (isRunning && !recDA) recDA = makeRec('da'); }, 1500); }
  }
}

// ── Translation ───────────────────────────────────────────
async function translate(text, from, to) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const go  = () => fetch(url).then(r => r.json()).then(d => {
    if (d.responseStatus === 200) return d.responseData.translatedText;
    throw new Error(d.responseDetails);
  });
  // Two parallel requests — take whichever resolves first
  const [a, b] = await Promise.allSettled([go(), go()]);
  if (a.status === 'fulfilled') return a.value;
  if (b.status === 'fulfilled') return b.value;
  throw new Error('Translation failed');
}

function enqueue(text, spokenLang) {
  // Dedupe: if same text was already queued skip it
  if (xQueue.length && xQueue[xQueue.length - 1].text === text) return;
  xQueue.push({ text, spokenLang });
  if (!xlating) drainQueue();
}

async function drainQueue() {
  if (!xQueue.length) { xlating = false; if (isRunning) setMic('on', 'Listening…'); return; }
  xlating = true;
  const { text, spokenLang } = xQueue.shift();
  const isEN   = spokenLang === 'en';
  const destEl = isEN ? liveDA : liveEN;

  if (isEN) { pushHist('en', text); liveEN.textContent = ''; }
  else      { pushHist('da', text); liveDA.textContent = ''; }

  destEl.textContent = 'translating…';
  destEl.classList.add('shimmer');
  setMic('busy', 'Translating…');

  try {
    const result = await translate(text, isEN ? 'en' : 'da', isEN ? 'da' : 'en');
    destEl.classList.remove('shimmer');
    destEl.textContent = '';
    if (isEN) pushHist('da', result);
    else      pushHist('en', result);
  } catch (e) {
    destEl.classList.remove('shimmer');
    destEl.textContent = '';
    log('Translation error: ' + e.message);
  }
  drainQueue();
}

// ── Recognizer factory ────────────────────────────────────
function makeRec(lang) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;

  const r = new SR();
  r.lang            = lang === 'en' ? 'en-US' : 'da-DK';
  r.continuous      = true;   // never stops → never re-prompts
  r.interimResults  = true;
  r.maxAlternatives = 1;

  r.onstart = () => { log(lang + ' recognizer started'); setMic('on', 'Listening…'); };

  r.onresult = (e) => {
    let interim = '', finals = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finals  += t + ' ';
      else                      interim += t;
    }

    // Show interim in this language's column
    if (lang === 'en') { intEN.textContent = interim; }
    else               { intDA.textContent = interim; }

    if (finals.trim()) {
      const text = finals.trim();

      // Clear interim
      if (lang === 'en') intEN.textContent = '';
      else               intDA.textContent = '';

      // Dedup: if the other recognizer already handled this phrase, skip
      const now = Date.now();
      const age = now - lastWinTime;
      if (text === lastWinText && age < 1200) {
        log(lang + ' dup skipped: ' + text.slice(0, 30));
        return;
      }
      lastWinText = text;
      lastWinTime = now;

      log(lang.toUpperCase() + ' final: ' + text.slice(0, 50));
      enqueue(text, lang);
    }
  };

  r.onerror = (e) => {
    log(lang + ' error: ' + e.error);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      permErr.textContent = 'Microphone was blocked. Click 🔒 in the address bar → Site settings → Microphone → Allow → refresh.';
      permErr.style.display = 'block';
      permOvr.classList.add('show');
      stopAll();
    }
    // no-speech and aborted are normal — ignore
  };

  r.onend = () => {
    // continuous=true: onend only fires if Chrome forcibly ends it.
    // Restart the same object — no new instance = no new permission prompt.
    if (isRunning) {
      const stillNeeded = (lang === 'en' && recEN === r) || (lang === 'da' && recDA === r);
      if (stillNeeded) {
        setTimeout(() => { try { r.start(); log(lang + ' restarted'); } catch(ex) {} }, 300);
      }
    }
  };

  try { r.start(); }
  catch (e) { log('makeRec start error (' + lang + '): ' + e.message); }

  return r;
}

function killRec(r) {
  if (!r) return;
  r.onstart = r.onresult = r.onerror = r.onend = null;
  try { r.abort(); } catch (e) {}
}

// ── Start / Stop ──────────────────────────────────────────
function doStart() {
  isRunning = true;
  btnStart.disabled = true;
  btnStop.disabled  = false;
  log('Starting recognizers, mode=' + mode);

  if (mode === 'en' || mode === 'auto') {
    recEN = makeRec('en');
  }
  if (mode === 'da' || mode === 'auto') {
    // Stagger DA start by 1.5s so Chrome doesn't see two simultaneous requests
    setTimeout(() => {
      if (isRunning && (mode === 'da' || mode === 'auto')) {
        recDA = makeRec('da');
      }
    }, 1500);
  }
}

function stopAll() {
  isRunning = false;
  killRec(recEN); recEN = null;
  killRec(recDA); recDA = null;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  xQueue.length = 0; xlating = false;
  btnStart.disabled = false; btnStop.disabled = true;
  intEN.textContent = ''; intDA.textContent = '';
  liveEN.classList.remove('shimmer'); liveDA.classList.remove('shimmer');
  setMic('off', 'Stopped');
}

// ── Permission flow ───────────────────────────────────────
// getUserMedia is called directly inside a button click handler.
// This is the ONLY reliable way Chrome shows the permission dialog.
// We keep the stream alive — both recognizers then share the
// already-open mic, so Chrome never re-prompts.
btnGrant.addEventListener('click', async () => {
  btnGrant.textContent = 'Requesting…';
  btnGrant.disabled    = true;
  permErr.style.display = 'none';
  log('getUserMedia…');
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    log('Mic granted ✓');
    permOvr.classList.remove('show');
    doStart();
  } catch (e) {
    log('getUserMedia denied: ' + e.name);
    btnGrant.textContent = 'Try Again';
    btnGrant.disabled    = false;
    permErr.textContent  = 'Could not access microphone: ' + e.message;
    permErr.style.display = 'block';
  }
});

function startAll() {
  // If mic already granted, skip the overlay
  if (navigator.permissions) {
    navigator.permissions.query({ name: 'microphone' }).then(r => {
      log('Mic permission: ' + r.state);
      if (r.state === 'granted') {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          micStream = stream;
          doStart();
        }).catch(e => log('gUM failed: ' + e.message));
      } else if (r.state === 'denied') {
        permErr.textContent  = 'Microphone is blocked. Click 🔒 → Site settings → Microphone → Allow → refresh.';
        permErr.style.display = 'block';
        permOvr.classList.add('show');
      } else {
        permOvr.classList.add('show');
      }
    }).catch(() => permOvr.classList.add('show'));
  } else {
    permOvr.classList.add('show');
  }
}

btnStart.addEventListener('click', startAll);
btnStop.addEventListener ('click', stopAll);
$('btn-clear').addEventListener('click', () => {
  histArrEN = []; histArrDA = [];
  histBoxEN.innerHTML = ''; histBoxDA.innerHTML = '';
  liveEN.textContent  = ''; liveDA.textContent  = '';
  liveEN.classList.remove('shimmer'); liveDA.classList.remove('shimmer');
  intEN.textContent = ''; intDA.textContent = '';
  lastWinText = '';
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' && e.target === document.body) { e.preventDefault(); isRunning ? stopAll() : startAll(); }
  if (e.key === 'Escape') stopAll();
  if (e.key === 'F11') { e.preventDefault(); toggleFS(); }
});

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
}

// ── Init ──────────────────────────────────────────────────
setMode('auto');

window.onload = () => {
  const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  const isHTTPS = location.protocol === 'https:' || location.hostname === 'localhost';
  log('Loaded. SR=' + hasSR + ' HTTPS=' + isHTTPS);
  if (!hasSR) {
    btnStart.disabled = true;
    setMic('off', 'Requires Chrome or Edge');
  }
  if (!isHTTPS) {
    permErr.textContent = 'Page must be served over HTTPS. Use your GitHub Pages URL.';
    permErr.style.display = 'block';
    permOvr.classList.add('show');
    btnStart.disabled = true;
  }
};
</script>
</body>
</html>
